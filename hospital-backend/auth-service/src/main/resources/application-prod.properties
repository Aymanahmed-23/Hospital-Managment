spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Recommended: set to 'validate' in production
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HBM2DDL:validate}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
# Port (optional) - override via environment in production if needed
server.port=${SERVER_PORT:8083}

# JWT Configuration (must be provided in production via env vars)
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

spring.datasource.hikari.data-source-properties.useSSL=${SPRING_DATASOURCE_USE_SSL:true}
spring.datasource.hikari.data-source-properties.requireSSL=${SPRING_DATASOURCE_REQUIRE_SSL:true}
